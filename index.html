<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>戰鬥陀螺・隨機組裝產生器</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">🌀</span>
      <div>
        <h1>戰鬥陀螺・隨機組裝</h1>
        <p class="brand-sub">勾選你擁有的零件，從庫存裡拉霸抽出 1～3 顆完整陀螺</p>
      </div>
    </div>

    <div class="gen-bar">
      <div class="count-pick" id="countPick" role="group" aria-label="產生顆數">
        <button type="button" class="count-btn active" data-count="1">1 顆</button>
        <button type="button" class="count-btn" data-count="2">2 顆</button>
        <button type="button" class="count-btn" data-count="3">3 顆</button>
      </div>
      <div class="nodup-group">
        <label class="nodup"><input type="checkbox" id="noDup" checked /> 上蓋不重複</label>
        <label class="nodup"><input type="checkbox" id="noDupRatchet" checked /> 固鎖不重複</label>
        <label class="nodup"><input type="checkbox" id="noDupBit" checked /> 軸心不重複</label>
      </div>
      <button type="button" id="genBtn" class="gen-btn">🎰 隨機產生</button>
    </div>
  </header>

  <!-- 隨機結果（拉霸） -->
  <section id="results" class="results" aria-live="polite">
    <div class="empty-hint" id="resultHint">
      在下方勾選你手上的零件，然後按「🎰 隨機產生」。
    </div>
    <div class="reel-row" id="reelRow"></div>
  </section>

  <!-- 庫存區 -->
  <section class="inventory">
    <div class="inv-tabs" id="invTabs" role="tablist">
      <button type="button" class="inv-tab active" data-tab="blade" role="tab">上蓋 <span class="cnt" id="cnt-blade">0</span></button>
      <button type="button" class="inv-tab" data-tab="ratchet" role="tab">固鎖 <span class="cnt" id="cnt-ratchet">0</span></button>
      <button type="button" class="inv-tab" data-tab="bit" role="tab">軸心 <span class="cnt" id="cnt-bit">0</span></button>
    </div>

    <!-- 上蓋系統次分頁（BX/UX/CX...） -->
    <div class="sys-tabs" id="sysTabs"></div>

    <div class="inv-toolbar">
      <input type="search" id="invSearch" class="inv-search" placeholder="搜尋名稱（中／日／英／代碼）…" />
      <div class="bulk">
        <button type="button" id="cxAddBtn" class="cx-add-btn" hidden>＋ 組裝新 CX 上蓋</button>
        <button type="button" data-bulk="all" class="bulk-btn">全選</button>
        <button type="button" data-bulk="none" class="bulk-btn">全不選</button>
        <button type="button" data-bulk="invert" class="bulk-btn">反選</button>
      </div>
    </div>

    <div class="part-grid" id="partGrid"></div>
  </section>

  <!-- CX 組裝器 Modal -->
  <div class="modal-overlay hidden" id="cxModal">
    <div class="modal" role="dialog" aria-modal="true" aria-label="CX 上蓋組裝器">
      <div class="modal-head">
        <h2>CX 上蓋組裝器</h2>
        <button type="button" class="modal-close" id="cxClose" aria-label="關閉">✕</button>
      </div>
      <div class="cx-modebar">
        <span>組合方式：</span>
        <button type="button" class="cx-mode-btn active" data-mode="3">3 件（紋章鎖＋主刃＋輔助刃）</button>
        <button type="button" class="cx-mode-btn" data-mode="4">4 件（紋章鎖＋金屬刃＋超越刃＋輔助刃）</button>
      </div>
      <div class="cx-preview-wrap">
        <div class="cx-stack" id="cxPreview"></div>
        <div class="cx-preview-name" id="cxPreviewName">（尚未選擇）</div>
      </div>
      <div class="cx-builder" id="cxBuilder"></div>
      <div class="modal-foot">
        <label class="cx-name-label">命名：
          <input type="text" id="cxName" placeholder="自動命名，可手動覆寫" maxlength="40" />
        </label>
        <button type="button" id="cxSave" class="cx-save-btn">儲存到我的 CX 上蓋</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p class="foot-disclaimer">
      本工具僅供<strong>學術研究與愛好者交流</strong>使用，無任何商業合作或營利行為；
      所有陀螺名稱、圖像與商標權利均屬原權利人所有。
    </p>
    <p class="foot-meta">
      設計者：<strong>AlanLiu</strong>
      <span class="foot-sep">·</span>
      <a class="foot-link" href="https://hi-alan-liu.github.io/beyblade-champion/" target="_blank" rel="noopener">🏆 排名卡產生器</a>
      <span class="foot-sep">·</span>
      <span>圖庫資料由 <code>x</code> 專案同步</span>
    </p>
  </footer>

  <script src="assets/db.bundle.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
